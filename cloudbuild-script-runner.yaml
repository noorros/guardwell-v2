# Generic one-off script runner for prod tsx scripts that need DATABASE_URL.
# Mirrors cloudbuild.yaml's prisma-migrate setup (cloud-sql-proxy + secret).
#
# Run via:
#   gcloud builds submit --config=cloudbuild-script-runner.yaml \
#     --substitutions=_SCRIPT=scripts/backfill-security-officer.ts,_ARGS=--dry-run .
substitutions:
  _SCRIPT: ""
  _ARGS: ""
steps:
  - name: node:20-slim
    id: run-script
    entrypoint: bash
    secretEnv:
      - DATABASE_URL
    args:
      - -c
      - |
        set -euo pipefail
        echo "Installing cloud-sql-proxy..."
        apt-get update -qq && apt-get install -y -qq curl ca-certificates >/dev/null
        curl -sSL -o /usr/local/bin/cloud-sql-proxy \
          https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64
        chmod +x /usr/local/bin/cloud-sql-proxy

        echo "Starting cloud-sql-proxy..."
        cloud-sql-proxy guardwell-prod:us-central1:guardwell-v2-db --port 5434 &
        PROXY_PID=$!
        for i in $(seq 1 30); do
          (echo > /dev/tcp/localhost/5434) >/dev/null 2>&1 && break
          sleep 1
        done

        echo "Installing dependencies + running ${_SCRIPT} ${_ARGS}..."
        cd /workspace
        npm ci --prefer-offline --no-audit --no-fund
        TCP_URL=$(echo "$$DATABASE_URL" \
          | sed -E 's|^postgresql://([^:]+):([^@]+)@[^/]*/([^?]+).*|postgresql://\1:\2@localhost:5434/\3|')
        DATABASE_URL="$$TCP_URL" npx prisma generate >/dev/null 2>&1
        DATABASE_URL="$$TCP_URL" npx tsx ${_SCRIPT} ${_ARGS}

        echo "Stopping proxy..."
        kill $$PROXY_PID || true

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
timeout: 600s
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/V2_DATABASE_URL/versions/latest
      env: DATABASE_URL

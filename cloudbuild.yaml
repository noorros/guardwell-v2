# Cloud Build pipeline for v2.app.gwcomp.com.
# NEXT_PUBLIC_FIREBASE_* substitutions come from the trigger configuration
# (not this file). Configure them via:
#   gcloud beta builds triggers update guardwell-v2-main \
#     --update-substitutions _NEXT_PUBLIC_FIREBASE_API_KEY=...,...
steps:
  - name: node:20-slim
    id: prisma-migrate
    entrypoint: bash
    secretEnv:
      - DATABASE_URL
    args:
      - -c
      - |
        set -euo pipefail
        echo "Installing cloud-sql-proxy..."
        apt-get update -qq && apt-get install -y -qq curl ca-certificates >/dev/null
        curl -sSL -o /usr/local/bin/cloud-sql-proxy \
          https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64
        chmod +x /usr/local/bin/cloud-sql-proxy

        echo "Starting cloud-sql-proxy..."
        cloud-sql-proxy guardwell-prod:us-central1:guardwell-v2-db --port 5434 &
        PROXY_PID=$!
        # Wait up to 30s for the proxy to bind :5434 (replaces a fragile sleep).
        for i in $(seq 1 30); do
          (echo > /dev/tcp/localhost/5434) >/dev/null 2>&1 && break
          sleep 1
        done

        echo "Installing dependencies + running prisma db push..."
        cd /workspace
        npm ci --prefer-offline --no-audit --no-fund
        # The DATABASE_URL secret uses Unix-socket form (host=... query param).
        # Rewrite to TCP so Prisma talks to the local proxy on :5434.
        TCP_URL=$(echo "$$DATABASE_URL" \
          | sed -E 's|^postgresql://([^:]+):([^@]+)@[^/]*/([^?]+).*|postgresql://\1:\2@localhost:5434/\3|')
        DATABASE_URL="$$TCP_URL" npx prisma db push --skip-generate

        echo "Stopping proxy..."
        kill $$PROXY_PID || true

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=us-central1-docker.pkg.dev/$PROJECT_ID/guardwell/guardwell-v2:$COMMIT_SHA
      - --tag=us-central1-docker.pkg.dev/$PROJECT_ID/guardwell/guardwell-v2:latest
      - --build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}
      - --build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - --build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - --build-arg=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      - --build-arg=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}
      - --build-arg=NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/guardwell/guardwell-v2
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - guardwell-v2
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/guardwell/guardwell-v2:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=$PROJECT_ID:us-central1:guardwell-v2-db
      - --service-account=guardwell-v2-runtime@$PROJECT_ID.iam.gserviceaccount.com
      # NOTE: --set-env-vars REPLACES (not merges). Adding a new env var here
      # also requires adding it to this list, otherwise it'll be wiped on the
      # next deploy. Same for --set-secrets below.
      - --set-env-vars=FIREBASE_PROJECT_ID=guardwell-prod,FIREBASE_CLIENT_EMAIL=firebase-adminsdk-fbsvc@guardwell-prod.iam.gserviceaccount.com,NEXT_PUBLIC_APP_URL=https://v2.app.gwcomp.com,LLM_MONTHLY_BUDGET_USD=200,GCS_EVIDENCE_BUCKET=guardwell-v2-evidence,PRACTICE_STORAGE_QUOTA_BYTES=5368709120
      - --set-secrets=DATABASE_URL=V2_DATABASE_URL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,UPSTASH_REDIS_REST_URL=UPSTASH_REDIS_REST_URL:latest,UPSTASH_REDIS_REST_TOKEN=UPSTASH_REDIS_REST_TOKEN_SECRET:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,STRIPE_PRICE_MONTHLY=STRIPE_PRICE_MONTHLY:latest,STRIPE_PRICE_ANNUAL=STRIPE_PRICE_ANNUAL:latest,RESEND_API_KEY=RESEND_API_KEY:latest,CRON_SECRET=CRON_SECRET:latest
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
timeout: 1200s
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/V2_DATABASE_URL/versions/latest
      env: DATABASE_URL

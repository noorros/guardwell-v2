# Cloud Build pipeline for v2.app.gwcomp.com.
# NEXT_PUBLIC_FIREBASE_* substitutions come from the trigger configuration
# (not this file). Configure them via:
#   gcloud beta builds triggers update guardwell-v2-main \
#     --update-substitutions _NEXT_PUBLIC_FIREBASE_API_KEY=...,...
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=us-central1-docker.pkg.dev/$PROJECT_ID/guardwell/guardwell-v2:$COMMIT_SHA
      - --tag=us-central1-docker.pkg.dev/$PROJECT_ID/guardwell/guardwell-v2:latest
      - --build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}
      - --build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - --build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - --build-arg=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      - --build-arg=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/guardwell/guardwell-v2
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - guardwell-v2
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/guardwell/guardwell-v2:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=$PROJECT_ID:us-central1:guardwell-v2-db
      - --service-account=guardwell-v2-runtime@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=FIREBASE_PROJECT_ID=guardwell-prod,FIREBASE_CLIENT_EMAIL=firebase-adminsdk-fbsvc@guardwell-prod.iam.gserviceaccount.com,NEXT_PUBLIC_APP_URL=https://v2.app.gwcomp.com
      - --set-secrets=DATABASE_URL=V2_DATABASE_URL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
timeout: 1200s
